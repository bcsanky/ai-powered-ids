experiment_id: exp-001
title: "Initial reproducible environment"
random_seed: 42

dataset:
  name: CIC-IDS2017
  version: "raw-v1"
  split_seed: 42

features:
  set_name: minimal
  columns:
    - destination_port
    - flow_duration
    - total_fwd_packets
    - total_backward_packets
    - flow_bytes_per_sec
    - flow_packets_per_sec

model:
  type: autoencoder
  framework: tensorflow
  latent_dim: 8
  epochs: 20
  batch_size: 128
  threshold_method: percentile_95

infra:
  wazuh_stack: single-node
  ml_service_image: mlservice:latest
  os: windows-wsl2

notes:
  goal: "Bring up stack and verify central log ingestion"
