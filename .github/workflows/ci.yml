name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff pyyaml

      - name: Lint
        run: |
          ruff check ml pipeline infra/mlservice/app

      - name: Run tests
        run: |
          pytest

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff pyyaml joblib matplotlib numpy pandas scipy scikit-learn pyarrow
